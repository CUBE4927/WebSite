<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Temperature-Density Gas Simulation</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #eee;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
      background: #111;
    }

    aside {
      padding: 18px;
      background: #181818;
      border-right: 1px solid #333;
      overflow: auto;
    }

    main {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 16px;
    }

    .row {
      margin: 12px 0;
    }

    label {
      display: grid;
      gap: 5px;
      font-size: 13px;
      color: #ccc;
    }

    input, select, button {
      box-sizing: border-box;
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #222;
      color: #eee;
      font: inherit;
    }

    button {
      cursor: pointer;
      background: #2c2c2c;
    }

    button:hover {
      background: #383838;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    canvas {
      width: min(80vmin, 768px);
      height: min(80vmin, 768px);
      image-rendering: pixelated;
      border: 1px solid #444;
      background: #000;
      box-shadow: 0 16px 60px rgba(0,0,0,0.5);
    }

    .note {
      font-size: 12px;
      line-height: 1.5;
      color: #aaa;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <aside>
    <h1>2D Gas Simulation</h1>

    <div class="row">
      <label>
        표시 모드
        <select id="mode">
          <option value="pixel">픽셀 모드: 온도 + 밀도</option>
          <option value="arrow">화살표 모드: 속도</option>
        </select>
      </label>
    </div>

    <div class="row">
      <label>dx <input id="dx" type="number" step="0.001" value="1"></label>
    </div>
    <div class="row">
      <label>dt <input id="dt" type="number" step="0.0001" value="0.01"></label>
    </div>
    <div class="row">
      <label>nu <input id="nu" type="number" step="0.0001" value="0.001"></label>
    </div>
    <div class="row">
      <label>alpha <input id="alpha" type="number" step="0.0001" value="0.001"></label>
    </div>
    <div class="row">
      <label>gamma <input id="gamma" type="number" step="0.01" value="1.4"></label>
    </div>

    <div class="row">
      <label>프레임당 계산 횟수 <input id="stepsPerFrame" type="number" min="1" max="50" step="1" value="2"></label>
    </div>

    <div class="row buttons">
      <button id="toggle">Pause</button>
      <button id="reset">Reset</button>
    </div>

    <div class="row buttons">
      <button id="random">Random T</button>
      <button id="heat">Add Heat</button>
    </div>

    <p class="note">
      클릭/드래그하면 해당 위치에 열을 추가한다.<br>
      압력은 P = ρT로 계산한다. 색상은 온도와 밀도에서 나온다.
    </p>
  </aside>

  <main>
    <canvas id="canvas" width="256" height="256"></canvas>
  </main>

  <script src="process.js"></script>
  <script src="visualize.js"></script>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const imageData = ctx.createImageData(256, 256);

    const inputs = {
      mode: document.getElementById("mode"),
      dx: document.getElementById("dx"),
      dt: document.getElementById("dt"),
      nu: document.getElementById("nu"),
      alpha: document.getElementById("alpha"),
      gamma: document.getElementById("gamma"),
      stepsPerFrame: document.getElementById("stepsPerFrame")
    };

    const sim = new GasSim2D(readParams());
    let running = true;
    let painting = false;

    function readNumber(input) {
      return Number.parseFloat(input.value);
    }

    function readParams() {
      return {
        dx: readNumber(inputs.dx),
        dt: readNumber(inputs.dt),
        nu: readNumber(inputs.nu),
        alpha: readNumber(inputs.alpha),
        gamma: readNumber(inputs.gamma)
      };
    }

    function syncParams() {
      sim.setParams(readParams());
    }

    for (const key of ["dx", "dt", "nu", "alpha", "gamma"]) {
      inputs[key].addEventListener("input", syncParams);
    }

    document.getElementById("toggle").addEventListener("click", (e) => {
      running = !running;
      e.target.textContent = running ? "Pause" : "Run";
    });

    document.getElementById("reset").addEventListener("click", () => {
      sim.resetHotCenter();
    });

    document.getElementById("random").addEventListener("click", () => {
      sim.resetRandomTemperature();
    });

    document.getElementById("heat").addEventListener("click", () => {
      sim.addHeat(128, 128, 2.0, 14);
    });

    function canvasPixelFromEvent(event) {
      const rect = canvas.getBoundingClientRect();
      const x = Math.floor((event.clientX - rect.left) / rect.width * 256);
      const y = Math.floor((event.clientY - rect.top) / rect.height * 256);
      return {
        x: Math.min(Math.max(x, 0), 255),
        y: Math.min(Math.max(y, 0), 255)
      };
    }

    function paintHeat(event) {
      const p = canvasPixelFromEvent(event);
      sim.addHeat(p.x, p.y, 0.5, 9);
    }

    canvas.addEventListener("pointerdown", (event) => {
      painting = true;
      paintHeat(event);
    });

    canvas.addEventListener("pointermove", (event) => {
      if (painting) paintHeat(event);
    });

    window.addEventListener("pointerup", () => {
      painting = false;
    });

    function render() {
      if (inputs.mode.value === "pixel") {
        drawPixelMode(ctx, sim, imageData);
      } else {
        drawArrowMode(ctx, sim, imageData, {
          spacing: 12,
          arrowScale: 120,
          background: true
        });
      }
    }

    function loop() {
      if (running) {
        const steps = Math.max(1, Math.min(50, Number.parseInt(inputs.stepsPerFrame.value || "1", 10)));
        for (let n = 0; n < steps; n++) sim.step();
      }

      render();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
