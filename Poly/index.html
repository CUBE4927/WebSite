<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Power Sum Factorization</title>
</head>
<body>
  <h2>1^n + 2^n + ... + x^n</h2>

  <input id="nInput" type="number" min="0" value="4">
  <button id="runBtn">실행</button>

  <h3>원래 다항식</h3>
  <pre id="polyOut"></pre>

  <h3>Primitive 정수계수 다항식</h3>
  <pre id="primOut"></pre>

  <h3>최종 결과</h3>
  <pre id="factOut"></pre>

  <h3>비고</h3>
  <pre id="noteOut"></pre>

  <script type="module">
    import { factorPowerSum } from "./main.js";

    const nInput = document.getElementById("nInput");
    const runBtn = document.getElementById("runBtn");

    function run() {
      const n = parseInt(nInput.value, 10);
      const result = factorPowerSum(n);

      document.getElementById("polyOut").textContent = result.rationalPolyString;
      document.getElementById("primOut").textContent = result.primitivePolyString;
      document.getElementById("factOut").textContent = result.factorString;
      document.getElementById("noteOut").textContent = result.lll.note;
    }

    runBtn.addEventListener("click", run);
    run();
  </script>
</body>
</html>
