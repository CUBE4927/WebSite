<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>다항식 인수분해</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
    }

    h1 {
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      min-height: 90px;
      font-size: 16px;
      padding: 12px;
      box-sizing: border-box;
      resize: vertical;
    }

    button {
      margin-top: 12px;
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
    }

    .box {
      margin-top: 20px;
      padding: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      background: #fafafa;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .label {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .examples {
      margin-top: 10px;
      color: #444;
      font-size: 14px;
    }

    code {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>다항식 인수분해기</h1>
  <p>
    정수 계수 1변수 다항식을 입력하면, 유리근 정리와 조립제법으로 인수분해합니다.
  </p>

  <textarea id="inputPoly">x^5 - x^4 - 7x^3 + x^2 + 12x</textarea>
  <br />
  <button id="factorBtn">인수분해</button>

  <div class="examples">
    예시:
    <code>x^3 - 6x^2 + 11x - 6</code>,
    <code>2x^3 - 3x^2 - 8x + 12</code>,
    <code>x^4 - 5x^2 + 4</code>,
    <code>x^2 + 1</code>
  </div>

  <div class="box">
    <div class="label">정규화된 다항식</div>
    <div id="normalizedOutput"></div>
  </div>

  <div class="box">
    <div class="label">인수분해 결과</div>
    <div id="factorOutput"></div>
  </div>

  <div class="box">
    <div class="label">설명</div>
    <div id="detailOutput"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
